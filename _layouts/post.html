<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>

<body>
  {% include header.html %}

  <main id="content" class="site-content">
    <article class="acw-post">

      <header class="acw-post-header">
        <div class="acw-container acw-post-header-inner">
          <p class="acw-section-label">Article</p>

          <h1>{{ page.title }}</h1>

          {% if page.description %}
            <p class="acw-post-description">
              {{ page.description }}
            </p>
          {% endif %}

          {% if page.date %}
            <p class="acw-post-meta">
              {{ page.date | date: "%-d %B %Y" }}
            </p>
          {% endif %}
        </div>
      </header>

      {% if page.hero_image %}
        <div class="acw-container acw-post-hero-wrap">
          <img
            class="acw-post-hero-image"
            src="{{ page.hero_image | relative_url }}"
            alt="{{ page.title }}"
            loading="eager"
          >
        </div>
      {% endif %}

      <div class="acw-container">
        <div class="acw-post-content">
          {{ content }}
        </div>
      </div>

    </article>
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
</body>
</html>
