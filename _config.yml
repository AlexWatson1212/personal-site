title: "Alex Watson"
description: "Calm, clear websites for therapists that help the right clients feel safe enough to reach out."

url: "https://alexanderwatson.co.uk"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM

future: true
permalink: /:title/

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - netlify.toml
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - _site