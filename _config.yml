title: "Alexander Watson"
description: "Helping therapists become easier to trust online through thoughtful positioning, clear messaging and websites that genuinely reflect the work behind them."

url: "https://alexanderwatson.co.uk"
baseurl: ""

lang: en-GB
timezone: Europe/London

markdown: kramdown

kramdown:
  input: GFM

future: true

permalink: /:title/

collections:
  guides:
    output: true
    permalink: /guides/:name/

plugins:
  - jekyll-sitemap

defaults:
  -
    scope:
      path: ""
    values:
      image: "/assets/images/brand/og-image.jpg"
  -
    scope:
      path: ""
      type: "guides"
    values:
      layout: guide
      category: "Practice Clarity"
      image: "/assets/images/brand/og-image.jpg"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - netlify.toml
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - _site
  - package.json
  - package-lock.json