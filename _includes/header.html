<header class="site-header" role="banner">
  <nav class="nav" role="navigation" aria-label="Main navigation">

    <a class="nav__brand" href="{{ '/' | relative_url }}" aria-label="Alexander Watson home">
      <img
        class="nav__logo"
        src="{{ '/assets/images/brand/aw-logo.png' | relative_url }}"
        alt="Alexander Watson"
      >
    </a>

    <button
      class="nav__toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="primary-nav"
      onclick="document.body.classList.toggle('menu-open'); this.setAttribute('aria-expanded', document.body.classList.contains('menu-open') ? 'true' : 'false');"
    >
      <span aria-hidden="true" class="nav__hamburger"></span>
    </button>

    <div
      class="nav__overlay"
      aria-hidden="true"
      onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');"
    ></div>

    <div class="nav__panel">
      <ul id="primary-nav" class="nav__links">

        <li>
          <a href="{{ '/' | relative_url }}">Home</a>
        </li>

        <li>
          <a href="{{ '/process/' | relative_url }}">Process</a>
        </li>

        <li>
          <a href="{{ '/website-design-for-therapists/' | relative_url }}">
            Website Design
          </a>
        </li>

        <li>
          <a href="{{ '/blog/' | relative_url }}">
            Library
          </a>
        </li>

        <li>
          <a href="{{ '/about/' | relative_url }}">
            About
          </a>
        </li>

      </ul>

      <a href="{{ '/contact/' | relative_url }}" class="nav__cta">
        Start with clarity
      </a>
    </div>

  </nav>
</header>
