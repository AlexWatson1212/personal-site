<header class="site-header" role="banner">
  <nav class="nav" role="navigation" aria-label="Main navigation">

    <a class="nav__brand" href="{{ '/' | relative_url }}" aria-label="Alexander Watson home">
      <img
        class="nav__logo"
        src="{{ '/assets/images/brand/aw-logo.png' | relative_url }}"
        alt="Alexander Watson"
      >
    </a>

    <button
      class="nav__toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="primary-nav"
      onclick="document.body.classList.toggle('menu-open'); this.setAttribute('aria-expanded', document.body.classList.contains('menu-open') ? 'true' : 'false');"
    >
      <span aria-hidden="true" class="nav__icon"></span>
    </button>

    <div
      class="nav__overlay"
      aria-hidden="true"
      onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');"
    ></div>

    <div class="nav__panel">
      <ul id="primary-nav" class="nav__links">

        <li>
          <a href="{{ '/' | relative_url }}#about" onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');">
            About
          </a>
        </li>

        <li>
          <a href="{{ '/' | relative_url }}#process" onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');">
            Process
          </a>
        </li>

        <li>
          <a href="{{ '/' | relative_url }}#examples" onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');">
            Examples
          </a>
        </li>

      </ul>

      <a
        href="mailto:hello@alexanderwatson.co.uk?subject=Website%20Enquiry"
        class="nav__cta"
        onclick="document.body.classList.remove('menu-open'); document.querySelector('.nav__toggle').setAttribute('aria-expanded', 'false');"
      >
        Contact
      </a>
    </div>

  </nav>
</header>
