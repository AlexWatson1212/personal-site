<header class="site-header" role="banner">
  <nav class="nav" role="navigation" aria-label="Main">
    <a class="nav__brand" href="{{ '/' | relative_url }}" aria-label="Alex Watson home">
      <span class="nav__brand-text" aria-hidden="true">AW</span>
    </a>

    <button
      class="nav__toggle"
      type="button"
      aria-label="Open menu"
      aria-controls="primary-nav"
      aria-expanded="false"
    >
      <span aria-hidden="true" class="nav__icon"></span>
    </button>

    <ul id="primary-nav" class="nav__links" hidden>
      <li>
        <a href="{{ '/' | relative_url }}#templates">Web Design</a>
      </li>

      <li>
        <a
          href="{{ '/blog/' | relative_url }}"
          {% if page.url contains "/blog" %}aria-current="page"{% endif %}
        >Blog</a>
      </li>

      <li>
        <a href="{{ '/' | relative_url }}#about">About</a>
      </li>

      <li>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </li>
    </ul>
  </nav>
</header>
