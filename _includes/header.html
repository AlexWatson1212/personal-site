<header class="site-header" role="banner">
  <div class="shell">

    <div class="brand-wrap">
      <a class="brand brand-home" href="{{ '/' | relative_url }}" aria-label="Alex Watson home">
        <img
          class="brand-mark"
          src="{{ '/assets/images/brand/logo-sage-webdesign.png' | relative_url }}"
          alt="Alex Watson"
          width="300"
          height="80"
          loading="eager"
          decoding="async"
        >
      </a>

      <span class="brand-tagline" aria-hidden="true">Websites for Therapists</span>
    </div>

    <button
      class="nav-toggle"
      type="button"
      aria-label="Open menu"
      aria-controls="site-menu"
      aria-expanded="false"
    >
      <span class="nav-toggle-lines" aria-hidden="true"></span>
    </button>

    <nav id="site-menu" class="site-nav" role="navigation" aria-label="Primary">
      <div class="site-nav-panel">
        <div class="site-nav-top">
          <span class="site-nav-title">Menu</span>

          <button
            class="nav-close"
            type="button"
            aria-label="Close menu"
          >
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <ul>
          <li>
            <a
              href="{{ '/websites-for-therapists/' | relative_url }}"
              {% if page.url contains "/websites-for-therapists" %}aria-current="page"{% endif %}
            >Pricing</a>
          </li>

          <li>
            <a
              href="{{ '/blog/' | relative_url }}"
              {% if page.url contains "/blog" %}aria-current="page"{% endif %}
            >Blog</a>
          </li>

          <li>
            <a
              href="{{ '/about/' | relative_url }}"
              {% if page.url contains "/about" %}aria-current="page"{% endif %}
            >About</a>
          </li>

          <li>
            <a href="{{ '/' | relative_url }}#contact">Contact</a>
          </li>
        </ul>
      </div>
    </nav>

  </div>
</header>
