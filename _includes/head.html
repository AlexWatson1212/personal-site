<!-- _includes/head.html -->

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title and page.title != "Home" %}
    {{ page.title }} · {{ site.title }}
  {% else %}
    {{ site.title }} · Calm websites for therapists
  {% endif %}
</title>

<meta
  name="description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>

<link rel="canonical" href="{{ page.url | absolute_url }}">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
>

<link rel="icon" href="{{ '/favicons/favicon.ico' | relative_url }}" sizes="any">
<link rel="icon" href="{{ '/favicons/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ '/favicons/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/favicons/site.webmanifest' | relative_url }}">

<meta name="theme-color" content="#8e9f84">
<meta name="color-scheme" content="light">

<meta property="og:type" content="website">
<meta
  property="og:title"
  content="{% if page.title and page.title != 'Home' %}{{ page.title | escape }} · {{ site.title }}{% else %}{{ site.title }} · Calm websites for therapists{% endif %}"
>
<meta
  property="og:description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta
  property="og:image"
  content="{{ '/assets/images/brand/social-preview.webp' | absolute_url }}"
>
<meta property="og:image:alt" content="Alexander Watson — Web Design for Therapists">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta
  name="twitter:title"
  content="{% if page.title and page.title != 'Home' %}{{ page.title | escape }} · {{ site.title }}{% else %}{{ site.title }} · Calm websites for therapists{% endif %}"
>
<meta
  name="twitter:description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>
<meta
  name="twitter:image"
  content="{{ '/assets/images/brand/social-preview.webp' | absolute_url }}"
>
<meta name="twitter:image:alt" content="Alexander Watson — Web Design for Therapists">
