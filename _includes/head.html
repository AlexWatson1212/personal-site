<!-- _includes/head.html -->

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title and page.title != "Home" %}
    {{ page.title }} · {{ site.title }}
  {% else %}
    {{ site.title }} · Calm websites for therapists
  {% endif %}
</title>

<meta
  name="description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>

<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta name="baseurl" content="{{ site.baseurl }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  rel="preload"
  as="style"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  onload="this.onload=null;this.rel='stylesheet'"
>
<noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
</noscript>

{% if page.url == "/" %}
<link
  rel="preload"
  as="image"
  href="{{ '/assets/images/brand/practice-clarity-blueprint-hero.webp' | relative_url }}"
  fetchpriority="high"
>
{% endif %}

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<link rel="icon" type="image/x-icon" href="{{ '/assets/images/brand/favicon.ico' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/brand/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/brand/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/brand/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/assets/images/brand/site.webmanifest' | relative_url }}">

<meta name="theme-color" content="#8e9f84">
<meta name="color-scheme" content="light">

<meta property="og:type" content="website">
<meta
  property="og:title"
  content="{% if page.title and page.title != 'Home' %}{{ page.title | escape }} · {{ site.title }}{% else %}{{ site.title }} · Calm websites for therapists{% endif %}"
>
<meta
  property="og:description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:image" content="{{ '/assets/images/brand/social-preview.webp' | absolute_url }}">
<meta property="og:image:alt" content="Alexander Watson — Web Design for Therapists">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta
  name="twitter:title"
  content="{% if page.title and page.title != 'Home' %}{{ page.title | escape }} · {{ site.title }}{% else %}{{ site.title }} · Calm websites for therapists{% endif %}"
>
<meta
  name="twitter:description"
  content="{% if page.description %}{{ page.description | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}"
>
<meta name="twitter:image" content="{{ '/assets/images/brand/social-preview.webp' | absolute_url }}">
<meta name="twitter:image:alt" content="Alexander Watson — Web Design for Therapists">
